<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cycle Clock — E8 Kinematic Spinors on the FIG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { display: block; }

.panel {
  background: rgba(10,10,30,0.85); padding: 12px 16px; border-radius: 8px;
  border: 1px solid rgba(100,150,255,0.3); font-size: 13px; line-height: 1.6;
}
.label { color: #888; }
.val { color: #fff; font-weight: bold; }
.chi-plus { color: #f0a030; }
.chi-minus { color: #a060f0; }
.gen0 { color: #e74c3c; }
.gen1 { color: #2ecc71; }
.gen2 { color: #3498db; }

/* Bottom bar: all panels in a row */
#bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; gap: 12px; padding: 14px 20px;
  background: rgba(5,5,15,0.92);
  border-top: 1px solid rgba(100,150,255,0.25);
  align-items: center;
  justify-content: space-between;
  z-index: 10;
}
#bottom-bar > div { flex-shrink: 0; }

#controls button {
  background: rgba(100,150,255,0.3); color: #fff; border: 1px solid rgba(100,150,255,0.5);
  padding: 8px 18px; margin: 3px; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 13px;
}
#controls button:hover { background: rgba(100,150,255,0.5); }
#controls button.active { background: rgba(100,200,100,0.5); border-color: rgba(100,200,100,0.7); }

#phase-ring { width: 110px; height: 110px; }

.bar-track { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin: 4px 0; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
</style>
</head>
<body>

<div id="bottom-bar">
  <div class="panel" id="controls">
    <button id="btn-play" onclick="togglePlay()">PLAY</button>
    <button id="btn-step" onclick="stepOnce()">STEP</button>
    <button id="btn-reset" onclick="resetSim()">RESET</button>
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
    <br>
    <span>Speed:</span>
    <input type="range" id="speed" min="1" max="20" value="3" style="width:60px;vertical-align:middle;">
    <span>PEL:</span>
    <input type="range" id="pel" min="1" max="40" value="10" style="width:60px;vertical-align:middle;">
    <span id="pel-val">10</span>
  </div>

  <div class="panel" id="hud">
    <div id="clock1-info"></div>
    <div id="clock2-info"></div>
    <div id="step-info"></div>
  </div>

  <div class="panel">
    <canvas id="phase-ring"></canvas>
  </div>

  <div class="panel" id="overlap-bar">
    <div><span class="label">Overlap</span> <span id="overlap-val" class="val">0</span></div>
    <div class="bar-track"><div class="bar-fill" id="overlap-fill" style="width:0%;background:#88bbff;"></div></div>
    <div><span class="label">Distance</span> <span id="dist-val" class="val">0</span></div>
    <div class="bar-track"><div class="bar-fill" id="dist-fill" style="width:0%;background:#f0a030;"></div></div>
    <div><span class="label">Savings</span> <span id="sav1-val" class="val">0</span></div>
    <div class="bar-track"><div class="bar-fill" id="sav1-fill" style="width:0%;background:#2ecc71;"></div></div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
               "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === GLOBALS ===
let scene, camera, renderer, controls;
let boardData, historyData, icosiData, clockGeom;
let vertexMeshes = [], edgeMeshes = [];
let clock1Mesh, clock2Mesh;
let clock1Trail = [], clock2Trail = [];
let pathLine0 = null, pathLine1 = null;
let startMarker0 = null, startMarker1 = null;
let empireMeshes = [];
let currentStep = 0;
let playing = false;
let animFrame = 0;

// === COLORS ===
const FIBER_COLORS = [
  0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6,
  0x1abc9c, 0xe67e22, 0x2980b9, 0xc0392b, 0x27ae60
];
const CHI_PLUS = 0xf0a030;
const CHI_MINUS = 0xa060f0;
const GEN_COLORS = [0xe74c3c, 0x2ecc71, 0x3498db];

// === INIT ===
async function init() {
  // Load data
  try {
    const [boardResp, histResp, icosiResp, geomResp] = await Promise.all([
      fetch('../fig_gameboard.json?v=4'),
      fetch('../game_history.json?v=3'),
      fetch('../icosidodecahedron.json?v=6'),
      fetch('../clock_geometry.json?v=5')
    ]);
    boardData = await boardResp.json();
    historyData = await histResp.json();
    icosiData = await icosiResp.json();
    clockGeom = await geomResp.json();
    console.log('Data loaded:', boardData.n_vertices, 'verts,', icosiData.vertices.length, 'icosi verts,', clockGeom.cell24_vertices.length, '24-cell verts');
  } catch(e) {
    console.error('FETCH ERROR:', e);
    return;
  }

  // Scene
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.03);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(-1, 0, 14);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.enableZoom = false;  // disable scroll/pinch zoom
  controls.minDistance = 1.5;
  controls.maxDistance = 20;
  controls.enablePan = true;

  // Lights
  scene.add(new THREE.AmbientLight(0x334466, 0.5));
  const pointLight = new THREE.PointLight(0x88bbff, 2, 20);
  pointLight.position.set(3, 5, 3);
  scene.add(pointLight);

  // Build the board
  buildBoard();
  buildClocks();
  buildExplodedViews();
  buildStartMarkers();
  buildPathLines();
  updateStep(0);
  drawPhaseRing(0);

  // Events
  window.addEventListener('resize', onResize);
  document.getElementById('pel').addEventListener('input', e => {
    document.getElementById('pel-val').textContent = e.target.value;
  });

  animate();
}

function buildBoard() {
  const positions = boardData.positions_3d;
  const empSizes = boardData.empire_sizes;
  const maxEmp = Math.max(...empSizes);

  // Vertices as small spheres
  const vertGeo = new THREE.SphereGeometry(0.02, 8, 8);
  positions.forEach((p, i) => {
    const empRatio = empSizes[i] / maxEmp;
    const color = new THREE.Color().setHSL(0.58, 0.3, 0.15 + empRatio * 0.35);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4 });
    const mesh = new THREE.Mesh(vertGeo, mat);
    mesh.position.set(p[0] * 1.4 - 4.3, p[1] * 1.4 + 1.5, p[2] * 1.4);  // scale up FIG, shift up
    mesh.userData = { idx: i, empSize: empSizes[i], baseOpacity: 0.4 };
    scene.add(mesh);
    vertexMeshes.push(mesh);
  });

  // Edges as thin lines
  const edgeGeo = new THREE.BufferGeometry();
  const edgePositions = [];
  const edgeColors = [];
  const maxSav = Math.max(...boardData.edge_savings);

  const FIG_OFFSET = -1.5;
  boardData.edges.forEach((e, idx) => {
    const [i, j] = e;
    const s = boardData.edge_savings[idx] / maxSav;
    edgePositions.push(positions[i][0]*1.4-4.3, positions[i][1]*1.4+1.5, positions[i][2]*1.4,
                       positions[j][0]*1.4-4.3, positions[j][1]*1.4+1.5, positions[j][2]*1.4);
    const c = new THREE.Color().setHSL(0.58, 0.5, s * 0.3);
    edgeColors.push(c.r, c.g, c.b, c.r, c.g, c.b);
  });

  edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
  edgeGeo.setAttribute('color', new THREE.Float32BufferAttribute(edgeColors, 3));
  const edgeMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.35 });
  const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
  scene.add(edgeLines);
}

function buildClockGroup(color) {
  const group = new THREE.Group();

  // Core orb — the particle marker (scaled for enlarged FIG)
  const coreGeo = new THREE.SphereGeometry(0.15, 32, 32);
  const coreMat = new THREE.MeshPhongMaterial({
    color, emissive: color, emissiveIntensity: 0.8,
    transparent: true, opacity: 0.95
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  core.name = 'core';
  group.add(core);

  // Inner glow halo
  const haloGeo = new THREE.SphereGeometry(0.25, 32, 32);
  const haloMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.18
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.name = 'halo';
  group.add(halo);

  // Outer glow
  const outerGeo = new THREE.SphereGeometry(0.35, 16, 16);
  const outerMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.06
  });
  const outer = new THREE.Mesh(outerGeo, outerMat);
  outer.name = 'outer';
  group.add(outer);

  // Generation ring
  const ringGeo = new THREE.TorusGeometry(0.28, 0.02, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: GEN_COLORS[0], transparent: true, opacity: 0.7
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.name = 'ring';
  group.add(ring);

  // === ICOSIDODECAHEDRON: the Coxeter Hamiltonian circuit ===
  const icoGroup = new THREE.Group();
  icoGroup.name = 'coxeterPoly';
  const icoScale = 1.75;

  if (icosiData && icosiData.vertices) {
    const sv = (i) => {
      const v = icosiData.vertices[i];
      return new THREE.Vector3(v[0]*icoScale, v[1]*icoScale, v[2]*icoScale);
    };

    // No solid shell — all structure shown through vertex highlighting and wireframe

    // Wireframe edges — the true icosidodecahedron structure
    const edgePositions = [];
    icosiData.edges.forEach(([a, b]) => {
      const va = sv(a), vb = sv(b);
      edgePositions.push(va.x,va.y,va.z, vb.x,vb.y,vb.z);
    });
    const edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x7788aa, transparent: true, opacity: 0.55 });
    const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
    icoGroup.add(edgeLines);

    // Hamiltonian path (will be progressively revealed)
    const hamPositions = [];
    for (let k = 0; k <= 30; k++) {
      const vi = icosiData.hamiltonian[k % 30];
      const v = icosiData.vertices[vi];
      hamPositions.push(v[0]*icoScale, v[1]*icoScale, v[2]*icoScale);
    }
    const hamGeo = new THREE.BufferGeometry();
    hamGeo.setAttribute('position', new THREE.Float32BufferAttribute(hamPositions, 3));
    hamGeo.setDrawRange(0, 31);  // show full path always
    const hamMat = new THREE.LineBasicMaterial({ color: 0xffffff, depthTest: false, linewidth: 3 });
    const hamLine = new THREE.Line(hamGeo, hamMat);
    hamLine.name = 'hamPath';
    hamLine.renderOrder = 10;
    icoGroup.add(hamLine);

    // Thick tube: 30 straight cylinder segments, hidden initially
    // Revealed one by one as the Coxeter phase advances
    for (let k = 0; k < 30; k++) {
      const vi0 = icosiData.hamiltonian[k];
      const vi1 = icosiData.hamiltonian[(k+1) % 30];
      const v0 = icosiData.vertices[vi0];
      const v1 = icosiData.vertices[vi1];
      const p0 = new THREE.Vector3(v0[0]*icoScale, v0[1]*icoScale, v0[2]*icoScale);
      const p1 = new THREE.Vector3(v1[0]*icoScale, v1[1]*icoScale, v1[2]*icoScale);
      const dir = new THREE.Vector3().subVectors(p1, p0);
      const len = dir.length();
      const mid = new THREE.Vector3().addVectors(p0, p1).multiplyScalar(0.5);
      const cylGeo = new THREE.CylinderGeometry(0.02, 0.02, len, 6);
      const cylMat = new THREE.MeshBasicMaterial({
        color: 0x222233,  // initial color, updated by highlight code
        transparent: true, opacity: 0.0  // start invisible
      });
      const cyl = new THREE.Mesh(cylGeo, cylMat);
      cyl.position.copy(mid);
      cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
      cyl.renderOrder = 9;
      cyl.name = `hamSeg_${k}`;
      icoGroup.add(cyl);
    }
    // Store segment references for fast access
    icoGroup.userData.hamSegs = [];
    for (let k = 0; k < 30; k++) {
      icoGroup.userData.hamSegs.push(icoGroup.getObjectByName(`hamSeg_${k}`));
    }

    // 30 vertex spheres — these get highlighted at 3 levels
    // dim = not in current fiber
    // medium (teal) = in current fiber's cuboctahedron (D4)
    // bright (A2 color) = in current A2 hexagon
    // white = the active root
    const nodGeo = new THREE.SphereGeometry(0.07, 10, 10);
    for (let k = 0; k < 30; k++) {
      const vi = icosiData.hamiltonian[k];
      const v = icosiData.vertices[vi];
      const nodMat = new THREE.MeshPhongMaterial({
        color: 0x334455, emissive: 0x111122, emissiveIntensity: 0.2,
        transparent: true, opacity: 0.25
      });
      const nod = new THREE.Mesh(nodGeo, nodMat);
      nod.position.set(v[0]*icoScale, v[1]*icoScale, v[2]*icoScale);
      nod.name = `icoNode_${k}`;
      icoGroup.add(nod);
    }

    // Active root marker (white, large)
    const curGeo = new THREE.SphereGeometry(0.14, 12, 12);
    const curMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const curMarker = new THREE.Mesh(curGeo, curMat);
    curMarker.name = 'icoCurrent';
    icoGroup.add(curMarker);
  }
  // Icosidodecahedron is NOT added to the orb group.
  // It will be placed at a fixed position to the right of the FIG.
  // Store it on the group for later retrieval.
  group.userData.icoGroup = icoGroup;

  // Closure flash ring
  const flashGeo = new THREE.TorusGeometry(0.45, 0.04, 8, 32);
  const flashMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.0
  });
  const flash = new THREE.Mesh(flashGeo, flashMat);
  flash.rotation.x = Math.PI / 2;
  flash.name = 'closureFlash';
  group.add(flash);

  // A2 color palette (used by 24-cell and nested hexagon)
  const A2_COLORS = [0xff4444, 0x44ff44, 0xff44ff, 0xffff44];

  // === 24-CELL: nested INSIDE the icosidodecahedron ===
  // The 24-cell (D4) is the fiber the clock currently occupies.
  // Note: cuboctahedron and hexagon are shown as exploded views
  // (separate shapes to the right), not nested inside the icosidodecahedron.
  // See buildExplodedViews() for those constructions.

  // Point light for local illumination
  const light = new THREE.PointLight(color, 1.5, 3);
  light.name = 'light';
  group.add(light);

  return group;
}

let ico1Group, ico2Group;
let connector1, connector2;
const ICO_POS_1 = new THREE.Vector3(4, 3.8, 0);
const ICO_POS_2 = new THREE.Vector3(4, -1.55, 0);

// Exploded view positions (right of icosidodecahedra)
const CUBO_POS_1 = new THREE.Vector3(8.5, 3.8, 0);
const CUBO_POS_2 = new THREE.Vector3(8.5, -1.55, 0);
const HEX_POS_1 = new THREE.Vector3(11.5, 3.8, 0);
const HEX_POS_2 = new THREE.Vector3(11.5, -1.55, 0);

function buildClocks() {
  console.log('buildClocks called, icosiData:', icosiData ? 'yes' : 'no');
  clock1Mesh = buildClockGroup(CHI_PLUS);
  scene.add(clock1Mesh);

  clock2Mesh = buildClockGroup(CHI_MINUS);
  scene.add(clock2Mesh);

  // Place icosidodecahedra at fixed positions to the right
  ico1Group = clock1Mesh.userData.icoGroup;
  ico2Group = clock2Mesh.userData.icoGroup;
  if (ico1Group) { ico1Group.position.copy(ICO_POS_1); scene.add(ico1Group); }
  if (ico2Group) { ico2Group.position.copy(ICO_POS_2); scene.add(ico2Group); }

  // Dotted connector lines from orbs to their icosidodecahedra
  const connGeo1 = new THREE.BufferGeometry();
  connGeo1.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,0], 3));
  connector1 = new THREE.Line(connGeo1,
    new THREE.LineBasicMaterial({ color: CHI_PLUS, transparent: true, opacity: 0.6 }));
  scene.add(connector1);

  const connGeo2 = new THREE.BufferGeometry();
  connGeo2.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,0], 3));
  connector2 = new THREE.Line(connGeo2,
    new THREE.LineBasicMaterial({ color: CHI_MINUS, transparent: true, opacity: 0.6 }));
  scene.add(connector2);

  // Position orbs at initial locations (with FIG offset)
  if (historyData && historyData.clocks) {
    const h0 = historyData.clocks[0].history[0];
    const h1 = historyData.clocks[1].history[0];
    clock1Mesh.position.set(h0.pos_3d[0]*1.4-4.3, h0.pos_3d[1]*1.4+1.5, h0.pos_3d[2]*1.4);
    clock2Mesh.position.set(h1.pos_3d[0]*1.4-4.3, h1.pos_3d[1]*1.4+1.5, h1.pos_3d[2]*1.4);
    targetPos0.copy(clock1Mesh.position);
    targetPos1.copy(clock2Mesh.position);
  }
}

// Smooth interpolation state
let targetPos0 = new THREE.Vector3();
let targetPos1 = new THREE.Vector3();
let lerpSpeed = 0.08;

function updateClockAppearance(group, chiColor, genIdx, coxeterPhase, empireSize, step) {
  const core = group.getObjectByName('core');
  const halo = group.getObjectByName('halo');
  const outer = group.getObjectByName('outer');
  const ring = group.getObjectByName('ring');
  const light = group.getObjectByName('light');
  const flash = group.getObjectByName('closureFlash');

  // Chirality color
  if (core) { core.material.color.setHex(chiColor); core.material.emissive.setHex(chiColor); }
  if (halo) halo.material.color.setHex(chiColor);
  if (outer) outer.material.color.setHex(chiColor);
  if (light) light.color.setHex(chiColor);

  // Generation ring color
  if (ring) ring.material.color.setHex(GEN_COLORS[genIdx]);

  // Empire-based glow radius: larger empire = bigger halo
  const empScale = 0.6 + (empireSize / 287) * 0.8;
  if (core) { core.userData = core.userData || {}; core.userData.empScale = empScale; }
  if (halo) halo.scale.setScalar(empScale * 1.5);
  if (outer) outer.scale.setScalar(empScale * 2.0);

  const A2_COLORS_U = [0xff4444, 0x44ff44, 0xff44ff, 0xffff44];

  // Update icosidodecahedron + nested polyhedra (detached, stored in userData)
  const icoPoly = group.userData.icoGroup;
  const fullCycle = coxeterPhase === 0 && step > 0;

  // (Exploded views now updated dynamically by updateExplodedCubo/Hex)
  // (Dead cell24/hexFiber code removed — Fix: Klee review #3)

  // === THREE-LEVEL VERTEX HIGHLIGHTING on the icosidodecahedron ===
  // The cuboctahedron and hexagon are not separate shapes —
  // they are SUBSETS of the icosidodecahedron's 30 vertices:
  //   dim        = not in current D4 fiber
  //   teal       = in same D4 fiber (cuboctahedron)
  //   bright A2  = in same D4 AND same A2 (hexagon)
  //   white      = the active root
  // Use per-orbit highlight data (Fix: Klee review #1)
  // Each clock has a different Coxeter orbit with different fiber/A2 sequences
  const orbitSeed = group.userData.orbitSeed || 0;
  const orbitKey = String(orbitSeed);
  const allHighlights = clockGeom && clockGeom.orbit_highlights;
  const hl = allHighlights && allHighlights[orbitKey] ? allHighlights[orbitKey] : (clockGeom && clockGeom.highlight);
  if (icoPoly && hl) {
    const cuboSteps = new Set((hl.step_cubo[String(coxeterPhase)] || []));
    const hexSteps = new Set((hl.step_hex[String(coxeterPhase)] || []));
    const a2f = group.userData.a2Fiber || 0;
    const A2C = [0xff4444, 0x44ff44, 0xff44ff, 0xffff44];

    for (let k = 0; k < 30; k++) {
      const nod = icoPoly.getObjectByName(`icoNode_${k}`);
      if (!nod) continue;

      // Three states: visited (has tube), current (white flash), unvisited (dim)
      const visited = fullCycle || k < coxeterPhase;
      const isCurrent = k === coxeterPhase;

      if (isCurrent) {
        // CURRENT: big white flash
        nod.material.color.setHex(0xffffff);
        nod.material.emissive.setHex(0xffffff);
        nod.material.emissiveIntensity = 1.0;
        nod.material.opacity = 1.0;
        nod.scale.setScalar(3.0);
      } else if (visited) {
        // VISITED: colored by chirality half + hierarchy level
        if (hexSteps.has(k)) {
          nod.material.color.setHex(A2C[a2f]);
          nod.material.emissive.setHex(A2C[a2f]);
          nod.material.emissiveIntensity = 0.6;
          nod.scale.setScalar(2.0);
        } else if (cuboSteps.has(k)) {
          nod.material.color.setHex(0x44ddee);
          nod.material.emissive.setHex(0x22aacc);
          nod.material.emissiveIntensity = 0.4;
          nod.scale.setScalar(1.5);
        } else {
          // Actual chirality from orbit fiber data (not step index)
          const vChi = (hl.orbit_fiber && hl.orbit_fiber[k] < 5) ? CHI_PLUS : CHI_MINUS;
          nod.material.color.setHex(vChi);
          nod.material.emissive.setHex(vChi);
          nod.material.emissiveIntensity = 0.3;
          nod.scale.setScalar(1.2);
        }
        nod.material.opacity = 0.9;
      } else {
        // UNVISITED: dim, tinted by actual chirality
        const uChi = (hl.orbit_fiber && hl.orbit_fiber[k] < 5) ? 0x332211 : 0x221133;
        nod.material.color.setHex(uChi);
        nod.material.emissive.setHex(uChi);
        nod.material.emissiveIntensity = 0.05;
        nod.material.opacity = 0.3;
        nod.scale.setScalar(0.6);
      }
    }

    // Hamiltonian path: reveal tube segments one by one
    const hamPath = icoPoly.getObjectByName('hamPath');
    if (hamPath) hamPath.geometry.setDrawRange(0, 0);
    // Reveal Hamiltonian tube segments one by one
    const hamSegs = icoPoly.userData.hamSegs || [];
    for (let k = 0; k < hamSegs.length; k++) {
      const seg = hamSegs[k];
      if (!seg) continue;
      if (fullCycle || k < coxeterPhase) {
        seg.material.opacity = 0.7;
        // Color by ACTUAL chirality of the root at step k
        const segChi = (hl.orbit_fiber && hl.orbit_fiber[k] < 5) ? CHI_PLUS : CHI_MINUS;
        seg.material.color.setHex(segChi);
        seg.visible = true;
      } else if (k === coxeterPhase && coxeterPhase > 0) {
        seg.material.opacity = 1.0;
        seg.material.color.setHex(0xffffff);
        seg.visible = true;
      } else {
        seg.visible = false;
      }
    }

    // White marker
    const cur = icoPoly.getObjectByName('icoCurrent');
    if (cur && icosiData) {
      const vi = icosiData.hamiltonian[coxeterPhase];
      const v = icosiData.vertices[vi];
      cur.position.set(v[0]*1.75, v[1]*1.75, v[2]*1.75);
    }
  }

  // Closure flash: bright white ring when phase returns to 0
  if (flash) {
    if (coxeterPhase === 0 && step > 0) {
      flash.material.opacity = 1.0;
      flash.scale.setScalar(2.0);
    } else {
      // Fade out
      flash.material.opacity *= 0.9;
      flash.scale.setScalar(1.0 + flash.material.opacity);
    }
  }
}

function updateStep(step) {
  if (!historyData || !historyData.clocks) return;
  currentStep = step;

  const c0 = historyData.clocks[0].history[step];
  const c1 = historyData.clocks[1].history[step];

  // Set interpolation targets (smooth movement, with FIG offset)
  targetPos0.set(c0.pos_3d[0]*1.4 - 4.3, c0.pos_3d[1]*1.4 + 1.5, c0.pos_3d[2]*1.4);
  targetPos1.set(c1.pos_3d[0]*1.4 - 4.3, c1.pos_3d[1]*1.4 + 1.5, c1.pos_3d[2]*1.4);

  // Update colors, phase dots, empire sizing, A2 fiber, active root
  const chi0 = c0.chirality > 0 ? CHI_PLUS : CHI_MINUS;
  const chi1 = c1.chirality > 0 ? CHI_PLUS : CHI_MINUS;
  clock1Mesh.userData.a2Fiber = c0.a2_fiber || 0;
  clock2Mesh.userData.a2Fiber = c1.a2_fiber || 0;
  clock1Mesh.userData.localRoot = c0.local_root_in_d4 || 0;
  clock2Mesh.userData.localRoot = c1.local_root_in_d4 || 0;
  // Per-clock orbit seed for correct highlight data (Fix: Klee review #1)
  clock1Mesh.userData.orbitSeed = c0.orbit_seed || 0;
  clock2Mesh.userData.orbitSeed = c1.orbit_seed || 0;

  // Update root-derived exploded views when fiber/A2 changes (Fix: Klee #5)
  updateExplodedCubo(0, c0.fiber);
  updateExplodedCubo(1, c1.fiber);
  updateExplodedHex(0, c0.fiber, c0.a2_fiber || 0);
  updateExplodedHex(1, c1.fiber, c1.a2_fiber || 0);
  updateClockAppearance(clock1Mesh, chi0, c0.generation, c0.coxeter_phase, c0.empire_size, step);
  updateClockAppearance(clock2Mesh, chi1, c1.generation, c1.coxeter_phase, c1.empire_size, step);

  // Highlight empires
  highlightEmpire(c0.vertex, c1.vertex);

  // (Trails replaced by persistent path lines)

  // Update HUD
  updateHUD(c0, c1, step);

  // Update bars
  if (step > 0 && historyData.step_log[step-1]) {
    const log = historyData.step_log[step-1];
    if (log.records.length > 2) {
      const inter = log.records[log.records.length - 1];
      const overlapPct = (inter.empire_overlap / 287 * 100).toFixed(0);
      document.getElementById('overlap-val').textContent = inter.empire_overlap;
      document.getElementById('overlap-fill').style.width = overlapPct + '%';
      document.getElementById('dist-val').textContent = inter.distance_3d.toFixed(2);
      document.getElementById('dist-fill').style.width = Math.min(inter.distance_3d/6*100, 100) + '%';
    }
    if (log.records[0] && log.records[1]) {
      const sav0 = log.records[0].savings || 0;
      const sav1 = log.records[1].savings || 0;
      document.getElementById('sav1-val').textContent = sav0 + ' / ' + sav1;
      document.getElementById('sav1-fill').style.width = (((sav0+sav1)/2)/180*100) + '%';
    }
  }

  // Update path and start markers
  updatePathVisibility(step);

  drawPhaseRing(c0.coxeter_phase);
}

function highlightEmpire(v0, v1) {
  // Reset all vertices to original color and opacity
  const maxEmp = boardData ? Math.max(...boardData.empire_sizes) : 1;
  vertexMeshes.forEach(m => {
    const empRatio = (m.userData.empSize || 0) / maxEmp;
    m.material.color.setHSL(0.58, 0.3, 0.15 + empRatio * 0.35);
    m.material.opacity = m.userData.baseOpacity || 0.4;
    m.scale.setScalar(1);
  });

  // Highlight empire members by BRIGHTNESS only (no color change)
  // Keeps the FIG's original gradient, shows empires as glow
  const emp0 = boardData.empire_members?.[String(v0)] || [];
  const emp1 = boardData.empire_members?.[String(v1)] || [];
  const set0 = new Set(emp0);
  const set1 = new Set(emp1);

  emp0.forEach(i => {
    if (vertexMeshes[i]) {
      vertexMeshes[i].material.opacity = 0.7;
      vertexMeshes[i].scale.setScalar(set1.has(i) ? 2.5 : 1.5);
      // Overlap: brighten to white
      if (set1.has(i)) {
        vertexMeshes[i].material.color.setHex(0xffffff);
      }
    }
  });
  emp1.forEach(i => {
    if (vertexMeshes[i] && !set0.has(i)) {
      vertexMeshes[i].material.opacity = 0.6;
      vertexMeshes[i].scale.setScalar(1.3);
    }
  });
}

function updateTrail(trail, pos, color, id) {
  const geo = new THREE.SphereGeometry(0.03, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(...pos);
  scene.add(m);
  trail.push(m);

  // Fade old trail points
  trail.forEach((t, i) => {
    const age = trail.length - i;
    t.material.opacity = Math.max(0.05, 0.6 - age * 0.02);
    t.scale.setScalar(Math.max(0.3, 1 - age * 0.03));
  });

  // Remove very old
  while (trail.length > 50) {
    const old = trail.shift();
    scene.remove(old);
    old.geometry.dispose();
    old.material.dispose();
  }
}

function updateHUD(c0, c1, step) {
  const chiClass = c => c.chirality > 0 ? 'chi-plus' : 'chi-minus';
  const chiSymbol = c => c.chirality > 0 ? '+' : '−';
  const genClass = c => 'gen' + c.generation;

  document.getElementById('clock1-info').innerHTML = `
    <span class="${chiClass(c0)}">■</span> Clock 0 &nbsp;
    v${c0.vertex} &nbsp;
    χ=<span class="${chiClass(c0)}">${chiSymbol(c0)}</span> &nbsp;
    L<span class="${genClass(c0)}">${c0.generation}</span> &nbsp;
    φ=${c0.coxeter_phase} &nbsp;
    emp=${c0.empire_size}
  `;
  document.getElementById('clock2-info').innerHTML = `
    <span class="${chiClass(c1)}">■</span> Clock 1 &nbsp;
    v${c1.vertex} &nbsp;
    χ=<span class="${chiClass(c1)}">${chiSymbol(c1)}</span> &nbsp;
    L<span class="${genClass(c1)}">${c1.generation}</span> &nbsp;
    φ=${c1.coxeter_phase} &nbsp;
    emp=${c1.empire_size}
  `;
  const phaseReturn = c0.coxeter_phase === 0 && step > 0;
  const cycleNum = Math.floor(step / 30);

  document.getElementById('step-info').innerHTML = `
    <span class="label">Step</span> <span class="val">${step}</span> / ${historyData.clocks[0].history.length - 1}
    &nbsp; h=30=2×3×5<br>
    <span class="label">Coxeter cycle:</span> ${phaseReturn ? '<span style="color:#2ecc71;">⟳ CYCLE ' + cycleNum + ' COMPLETE</span>' : `φ=${c0.coxeter_phase}/30 (cycle ${cycleNum})`}
  `;
}

function drawPhaseRing(phase) {
  const canvas = document.getElementById('phase-ring');
  const ctx = canvas.getContext('2d');
  const w = 180, h = 180;
  canvas.width = w; canvas.height = h;
  const cx = w/2, cy = h/2, r = 70;

  ctx.clearRect(0, 0, w, h);

  // Draw 30 phase marks
  for (let k = 0; k < 30; k++) {
    const angle = (k / 30) * Math.PI * 2 - Math.PI/2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    const isCurrent = k === phase;

    ctx.beginPath();
    ctx.arc(x, y, isCurrent ? 6 : 3, 0, Math.PI * 2);
    if (k < 15) {
      ctx.fillStyle = isCurrent ? '#f0a030' : 'rgba(240,160,48,0.3)';
    } else {
      ctx.fillStyle = isCurrent ? '#a060f0' : 'rgba(160,96,240,0.3)';
    }
    ctx.fill();

    // C^15 boundary line
    if (k === 0 || k === 15) {
      const x2 = cx + (r+15) * Math.cos(angle);
      const y2 = cy + (r+15) * Math.sin(angle);
      ctx.beginPath();
      ctx.moveTo(cx + (r-10)*Math.cos(angle), cy + (r-10)*Math.sin(angle));
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = 'rgba(255,100,100,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Label
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Coxeter Phase', cx, cy - 8);
  ctx.fillText(`φ = ${phase}`, cx, cy + 5);
  ctx.fillText('h = 30', cx, cy + 18);
}

let explodedCubos = [], explodedHexes = [];
let cuboConnectors = [], hexConnectors = [];

function buildExplodedViews() {
  const A2C = [0xff4444, 0x44ff44, 0xff44ff, 0xffff44];
  const cuboPositions = [CUBO_POS_1, CUBO_POS_2];
  const hexPositions = [HEX_POS_1, HEX_POS_2];
  const icoPositions = [ICO_POS_1, ICO_POS_2];
  const colors = [CHI_PLUS, CHI_MINUS];

  for (let ci = 0; ci < 2; ci++) {
    // === CUBOCTAHEDRON: root-derived from conformal selection (Fix: Klee #5) ===
    // Uses actual D4 fiber geometry, not generic coordinates.
    // Updated dynamically when the clock changes fiber.
    const cuboGroup = new THREE.Group();
    cuboGroup.position.copy(cuboPositions[ci]);
    cuboGroup.name = `cubo_${ci}`;
    // Will be populated by updateExplodedCubo() based on current fiber
    scene.add(cuboGroup);
    explodedCubos.push(cuboGroup);

    // === HEXAGON: root-derived from A2 sub-fiber (Fix: Klee #5) ===
    // Uses actual A2 vertex positions from the conformal cuboctahedron.
    // Updated dynamically when the clock changes fiber/A2.
    const hexGroup = new THREE.Group();
    hexGroup.position.copy(hexPositions[ci]);
    hexGroup.name = `hex_${ci}`;
    scene.add(hexGroup);
    explodedHexes.push(hexGroup);

    // === DASHED CONNECTOR: icosidodecahedron → cuboctahedron ===
    const ccGeo = new THREE.BufferGeometry();
    ccGeo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,0], 3));
    const ccLine = new THREE.Line(ccGeo,
      new THREE.LineDashedMaterial({ color: 0x44ddee, dashSize: 0.08, gapSize: 0.06,
        transparent: true, opacity: 0.5 }));
    ccLine.computeLineDistances();
    scene.add(ccLine);
    cuboConnectors.push(ccLine);

    // === DASHED CONNECTOR: cuboctahedron → hexagon ===
    const hcGeo = new THREE.BufferGeometry();
    hcGeo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,0], 3));
    const hcLine = new THREE.Line(hcGeo,
      new THREE.LineDashedMaterial({ color: A2C[0], dashSize: 0.06, gapSize: 0.05,
        transparent: true, opacity: 0.5 }));
    hcLine.computeLineDistances();
    scene.add(hcLine);
    hexConnectors.push(hcLine);
  }
}

// Track last fiber to avoid rebuilding when unchanged
let lastFiber = [-1, -1];
let lastA2 = [-1, -1];

function updateExplodedCubo(clockIdx, fiberIdx) {
  if (!clockGeom || !clockGeom.fiber_cuboctahedra) return;
  if (lastFiber[clockIdx] === fiberIdx) return;  // no change
  lastFiber[clockIdx] = fiberIdx;

  const cuboData = clockGeom.fiber_cuboctahedra[String(fiberIdx)];
  if (!cuboData) return;

  const group = explodedCubos[clockIdx];
  // Clear old children
  while (group.children.length) {
    const c = group.children[0];
    group.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
  }

  const scale = 0.65;
  const A2C = [0xff4444, 0x44ff44, 0xff44ff, 0xffff44];

  // Edges
  const epos = [];
  cuboData.edges.forEach(([a, b]) => {
    const va = cuboData.vertices_3d[a], vb = cuboData.vertices_3d[b];
    epos.push(va[0]*scale,va[1]*scale,va[2]*scale, vb[0]*scale,vb[1]*scale,vb[2]*scale);
  });
  const egeo = new THREE.BufferGeometry();
  egeo.setAttribute('position', new THREE.Float32BufferAttribute(epos, 3));
  group.add(new THREE.LineSegments(egeo,
    new THREE.LineBasicMaterial({ color: 0x44ddee, transparent: true, opacity: 0.6 })));

  // Vertices colored by A2 fiber
  const dg = new THREE.SphereGeometry(0.04, 8, 8);
  cuboData.vertices_3d.forEach((v, i) => {
    const a2f = cuboData.a2_colors[i];
    const d = new THREE.Mesh(dg, new THREE.MeshBasicMaterial({ color: A2C[a2f] }));
    d.position.set(v[0]*scale, v[1]*scale, v[2]*scale);
    group.add(d);
  });
}

function updateExplodedHex(clockIdx, fiberIdx, a2Fiber) {
  if (!clockGeom || !clockGeom.fiber_cuboctahedra || !clockGeom.fiber_hexagons) return;
  if (lastFiber[clockIdx] === fiberIdx && lastA2[clockIdx] === a2Fiber) return;
  lastA2[clockIdx] = a2Fiber;

  const group = explodedHexes[clockIdx];
  while (group.children.length) {
    const c = group.children[0];
    group.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
  }

  const cuboData = clockGeom.fiber_cuboctahedra[String(fiberIdx)];
  const hexData = clockGeom.fiber_hexagons[String(fiberIdx)];
  if (!cuboData || !hexData) return;

  const a2Data = hexData[String(a2Fiber)];
  if (!a2Data) return;

  const A2C = [0xff4444, 0x44ff44, 0xff44ff, 0xffff44];
  const color = A2C[a2Fiber];
  const scale = 0.65;

  // Get the A2 vertices from the cuboctahedron
  const members = a2Data.cubo_vertex_indices;
  const pts = members.map(i => cuboData.vertices_3d[i]);

  // Outline
  if (pts.length >= 3) {
    const opos = [];
    for (let k = 0; k < pts.length; k++) {
      const p0 = pts[k], p1 = pts[(k+1) % pts.length];
      opos.push(p0[0]*scale,p0[1]*scale,p0[2]*scale, p1[0]*scale,p1[1]*scale,p1[2]*scale);
    }
    const ogeo = new THREE.BufferGeometry();
    ogeo.setAttribute('position', new THREE.Float32BufferAttribute(opos, 3));
    group.add(new THREE.LineSegments(ogeo,
      new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 })));
  }

  // Vertex dots
  const dg = new THREE.SphereGeometry(0.05, 8, 8);
  pts.forEach(p => {
    const d = new THREE.Mesh(dg, new THREE.MeshBasicMaterial({ color }));
    d.position.set(p[0]*scale, p[1]*scale, p[2]*scale);
    group.add(d);
  });
}

function buildStartMarkers() {
  // No spatial start markers
}

function buildPathLines() {
  // Pre-build the full path geometry for both clocks
  // We'll reveal segments progressively as steps advance

  const makePathLine = (clockIdx, color) => {
    const history = historyData.clocks[clockIdx].history;
    const positions = [];
    const colors = [];
    for (let i = 0; i < history.length; i++) {
      positions.push(history[i].pos_3d[0]*1.4-4.3, history[i].pos_3d[1]*1.4+1.5, history[i].pos_3d[2]*1.4);
      // Color by chirality at that step
      const c = new THREE.Color(history[i].chirality > 0 ? CHI_PLUS : CHI_MINUS);
      colors.push(c.r, c.g, c.b);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    // Start with nothing visible
    geo.setDrawRange(0, 0);
    const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7, linewidth: 2 });
    return new THREE.Line(geo, mat);
  };

  pathLine0 = makePathLine(0, CHI_PLUS);
  pathLine1 = makePathLine(1, CHI_MINUS);
  scene.add(pathLine0);
  scene.add(pathLine1);
}

function updatePathVisibility(step) {
  // Show path up to current step
  if (pathLine0) pathLine0.geometry.setDrawRange(0, step + 1);
  if (pathLine1) pathLine1.geometry.setDrawRange(0, step + 1);

}

// === ANIMATION ===
function animate() {
  requestAnimationFrame(animate);
  animFrame++;
  controls.update();

  // Auto-play (much slower: speed 1 = every 120 frames, speed 20 = every 10 frames)
  const speedVal = parseInt(document.getElementById('speed').value);
  const interval = Math.max(10, 130 - speedVal * 6);
  if (playing && animFrame % interval === 0) {
    stepOnce();
  }

  // Smooth position interpolation
  if (clock1Mesh && clock2Mesh) {
    clock1Mesh.position.lerp(targetPos0, lerpSpeed);
    clock2Mesh.position.lerp(targetPos1, lerpSpeed);

    // Empire-based size with gentle breathing
    const breath = 1 + 0.08 * Math.sin(animFrame * 0.04);
    const haloBr = 1 + 0.15 * Math.sin(animFrame * 0.03);
    [clock1Mesh, clock2Mesh].forEach(group => {
      const core = group.getObjectByName('core');
      const halo = group.getObjectByName('halo');
      const outer = group.getObjectByName('outer');
      const empS = (core && core.userData && core.userData.empScale) || 1.0;
      if (core) core.scale.setScalar(empS * breath);
      if (halo) halo.scale.setScalar(empS * haloBr);
      if (outer) outer.scale.setScalar(empS * haloBr * 1.1);

      // Fade closure flash over time
      const flash = group.getObjectByName('closureFlash');
      if (flash && flash.material.opacity > 0.01) {
        flash.material.opacity *= 0.97;
        flash.scale.setScalar(1.0 + (1 - flash.material.opacity) * 1.5);
      }
    });

    // Spin the generation rings
    const ring1 = clock1Mesh.getObjectByName('ring');
    const ring2 = clock2Mesh.getObjectByName('ring');
    if (ring1) ring1.rotation.z += 0.015;
    if (ring2) ring2.rotation.z -= 0.015;

    // Three nested layers each spinning at different rates
    // Icosidodecahedron (outer): slow tumble
    if (ico1Group) { ico1Group.rotation.y += 0.003; ico1Group.rotation.x += 0.001; }
    if (ico2Group) { ico2Group.rotation.y -= 0.003; ico2Group.rotation.x += 0.001; }

    // Rotate exploded shapes gently
    explodedCubos.forEach((g, i) => { g.rotation.y += (i===0?1:-1)*0.004; g.rotation.x += 0.001; });
    explodedHexes.forEach((g, i) => { g.rotation.z += (i===0?1:-1)*0.008; g.rotation.y += 0.003; });

    // Update connector dashed lines
    const icoPs = [ICO_POS_1, ICO_POS_2];
    const cuboPs = [CUBO_POS_1, CUBO_POS_2];
    const hexPs = [HEX_POS_1, HEX_POS_2];
    for (let ci = 0; ci < 2; ci++) {
      if (cuboConnectors[ci]) {
        const pa = cuboConnectors[ci].geometry.attributes.position.array;
        pa[0]=icoPs[ci].x; pa[1]=icoPs[ci].y; pa[2]=icoPs[ci].z;
        pa[3]=cuboPs[ci].x; pa[4]=cuboPs[ci].y; pa[5]=cuboPs[ci].z;
        cuboConnectors[ci].geometry.attributes.position.needsUpdate = true;
        cuboConnectors[ci].computeLineDistances();
        const hasCubo = explodedCubos[ci] && explodedCubos[ci].children.length > 0;
        const targetOp = hasCubo ? 0.5 : 0.0;
        cuboConnectors[ci].material.opacity += (targetOp - cuboConnectors[ci].material.opacity) * 0.15;
      }
      if (hexConnectors[ci]) {
        const pa = hexConnectors[ci].geometry.attributes.position.array;
        pa[0]=cuboPs[ci].x; pa[1]=cuboPs[ci].y; pa[2]=cuboPs[ci].z;
        pa[3]=hexPs[ci].x; pa[4]=hexPs[ci].y; pa[5]=hexPs[ci].z;
        hexConnectors[ci].geometry.attributes.position.needsUpdate = true;
        hexConnectors[ci].computeLineDistances();
        // Fade connector based on whether hex has content
        const hasHex = explodedHexes[ci] && explodedHexes[ci].children.length > 0;
        const targetOpacity = hasHex ? 0.5 : 0.0;
        hexConnectors[ci].material.opacity += (targetOpacity - hexConnectors[ci].material.opacity) * 0.15;
      }
      // Fade hex group in/out smoothly
      if (explodedHexes[ci]) {
        explodedHexes[ci].children.forEach(child => {
          if (child.material) {
            child.material.transparent = true;
            if (child.material.opacity < 0.8) child.material.opacity += 0.05;
          }
        });
      }
    }

    // Update connector lines from orbs to icosidodecahedra
    if (connector1 && clock1Mesh) {
      const p = clock1Mesh.position;
      const posArr = connector1.geometry.attributes.position.array;
      posArr[0]=p.x; posArr[1]=p.y; posArr[2]=p.z;
      posArr[3]=ICO_POS_1.x; posArr[4]=ICO_POS_1.y; posArr[5]=ICO_POS_1.z;
      connector1.geometry.attributes.position.needsUpdate = true;
      connector1.computeLineDistances();
      connector1.material.color.setHex(clock1Mesh.getObjectByName('core')?.material.color.getHex() || CHI_PLUS);
    }
    if (connector2 && clock2Mesh) {
      const p = clock2Mesh.position;
      const posArr = connector2.geometry.attributes.position.array;
      posArr[0]=p.x; posArr[1]=p.y; posArr[2]=p.z;
      posArr[3]=ICO_POS_2.x; posArr[4]=ICO_POS_2.y; posArr[5]=ICO_POS_2.z;
      connector2.geometry.attributes.position.needsUpdate = true;
      connector2.computeLineDistances();
      connector2.material.color.setHex(clock2Mesh.getObjectByName('core')?.material.color.getHex() || CHI_MINUS);
    }

    // 24-cell now nested inside icosidodecahedron — rotates with it
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// === CONTROLS ===
window.togglePlay = function() {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? 'PAUSE' : 'PLAY';
  document.getElementById('btn-play').classList.toggle('active', playing);
};

window.stepOnce = function() {
  const maxStep = historyData.clocks[0].history.length - 1;
  if (currentStep < maxStep) {
    updateStep(currentStep + 1);
  } else {
    playing = false;
    document.getElementById('btn-play').textContent = 'PLAY';
    document.getElementById('btn-play').classList.remove('active');
  }
};

window.zoomIn = function() {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.addScaledVector(dir, 0.8);
  const d = camera.position.length();
  if (d < 1.5) camera.position.setLength(1.5);
};

window.zoomOut = function() {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.addScaledVector(dir, -0.8);
  const d = camera.position.length();
  if (d > 20) camera.position.setLength(20);
};

window.resetSim = function() {
  playing = false;
  document.getElementById('btn-play').textContent = 'PLAY';
  document.getElementById('btn-play').classList.remove('active');
  // Reset path visibility
  if (pathLine0) pathLine0.geometry.setDrawRange(0, 0);
  if (pathLine1) pathLine1.geometry.setDrawRange(0, 0);
  updateStep(0);
};

// === START ===
init();
</script>
</body>
</html>
